# The main pipeline for indra_dlt_pipeline_project1

resources:
  pipelines:
    indra_dlt_pipeline_project1_etl:
      name: indra_dlt_pipeline_project1_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/indra_dlt_pipeline_project1_etl"

      libraries:
        - glob:
            include: ../src/indra_dlt_pipeline_project1_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
